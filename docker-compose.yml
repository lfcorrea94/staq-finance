services:
  postgres:
    image: postgres:17-alpine
    container_name: staqfinance-postgres
    environment:
      POSTGRES_DB: staqfinance
      POSTGRES_USER: staq
      POSTGRES_PASSWORD: staq_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staq -d staqfinance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
